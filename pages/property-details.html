<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Properties | EstatePro</title>

    <link rel="stylesheet" href="../CSS/property-details.css" />

    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700&family=Inter:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
    />
  </head>

  <body>
    <!-- ================= NAVBAR ================= -->

    <header>
      <nav class="navbar">
        <div class="container">
          <a href="#" class="logo">
            <i class="fa-solid fa-house"></i>
            <span>EstatePro</span>
          </a>

          <ul class="nav-links">
            <li><a href="../index.html">Home</a></li>
            <li><a href="./pages/properties.html">Properties</a></li>
            <li><a href="#">Agents</a></li>
            <li><a href="#">About</a></li>
            <li><a href="#">Contact</a></li>
          </ul>

          <div class="nav-buttons">
            <a href="#" class="login-btn">Login</a>
            <a href="#" class="register-btn">Register</a>
          </div>

          <div class="menu-btn">
            <i class="fa-solid fa-bars"></i>
          </div>
        </div>
      </nav>
    </header>

    <!-- ================= PROPERTY HERO ================= -->

    <section class="property-hero">
      <div class="container">
        <div class="property-hero-content">
          <div class="property-badge">For Sale</div>

          <h1>Luxury Family Villa</h1>

          <p class="property-address">
            <i class="fa-solid fa-location-dot"></i>

            Road 12, Gulshan 2, Dhaka, Bangladesh
          </p>

          <div class="property-meta">
            <span>
              <i class="fa-solid fa-bed"></i>

              4 Bedrooms
            </span>

            <span>
              <i class="fa-solid fa-bath"></i>

              3 Bathrooms
            </span>

            <span>
              <i class="fa-solid fa-ruler-combined"></i>

              2,500 Sq Ft
            </span>
          </div>

          <div class="property-price">$325,000</div>
        </div>
      </div>
    </section>

    <script src="../js/property-details.js"></script>
  </body>
</html>
